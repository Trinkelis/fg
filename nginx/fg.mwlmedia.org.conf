server {
    listen 80; listen [::]:80;
    server_name fg.mwlmedia.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fg.mwlmedia.org;

    ssl_certificate     /etc/letsencrypt/live/fg.mwlmedia.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fg.mwlmedia.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Required for FFmpeg.wasm (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy  "require-corp"  always;

    client_max_body_size 4G;

    location / {
        proxy_pass         http://127.0.0.1:7878;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        # 5 min upper bound: datamosh + transition pipelines can take a
        # while on longer clips. The per-read timer resets while the
        # response is actively streaming, so this only fires for
        # genuinely idle connections.
        proxy_send_timeout  300s;
        # Don't buffer large uploads — stream straight to the Node process.
        proxy_request_buffering off;
        proxy_buffering          off;
    }
}